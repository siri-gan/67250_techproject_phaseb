<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Siri Ganapathineedi">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <title>MonoMuse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body onload="addYear()">
    <div class="container">
        <header class="header">
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        </header>
        <nav class="nav_bar">
            <a href="../index.html" class="nav_home_mobile">Home</a>
            <button type="button" class="nav_hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="primaryNavLinks">&#9776;</button>
            <div class="nav_links" id="primaryNavLinks">
                <a href="../index.html" class="nav_home_desktop">Home</a>
                <a href="explore.html">Explore</a>
                <a href="exhibitions.html">Exhibitions</a>
                <a href="buytickets.html" class="cta">Buy Tickets</a>
                <a href="checkout.html">Checkout</a>
            </div>
        </nav>

        <main class="main">
            <table>
                <tr>
                    <th>Ticket Type</th>
                    <th>Description</th>
                    <th>Price</th>
                </tr>
                <tr>
                    <td>Adult</td>
                    <td>General admission for ages 18 and over. Under 18 free.</td>
                    <td>$18</td>
                </tr>
                <tr>
                    <td>Student</td>
                    <td>Student ID required</td>
                    <td>$10</td>
                </tr>
                <tr>
                    <td>Member</td>
                    <td>Member ID required</td>
                    <td>$15</td>
                </tr>
            </table>
        </main>
        <figure class="main_img">
            <img src="../static/monomuselogo.png" alt="">
        </figure>
        <footer class="footer">
            <p id="copyYear"></p>
        </footer>
    </div>
    <script src="../static/script.js"></script>
</body>
</html>
