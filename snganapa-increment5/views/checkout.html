<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Siri Ganapathineedi">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="Museum website redesign project">
    <title>MonoMuse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body onload="addYear()">
    <div class="container">
        <header class="header">
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        </header>
        <nav class="nav_bar">
            <a href="../index.html" class="nav_home_mobile">Home</a>
            <button type="button" class="nav_hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="primaryNavLinks">&#9776;</button>
            <div class="nav_links" id="primaryNavLinks">
                <a href="../index.html" class="nav_home_desktop">Home</a>
                <a href="explore.html">Explore</a>
                <a href="exhibitions.html">Exhibitions</a>
                <a href="buytickets.html" class="cta">Buy Tickets</a>
                <a href="checkout.html">Checkout</a>
            </div>
        </nav>

        <main class="main">
            <form>
                <label for="name">Name: (required)</label><br> 
                <input id="name" name="name" type="text" required><br><br>

                <label for="email">Email: (required)</label><br>
                <input id="email" name="email" type="email" required><br><br>

                <label for="quantity">Ticket Quantity: (required)</label><br>
                <input id="quantity" name="quantity" type="number" min="1" required><br><br>

                <button type="submit">Submit</button>
            </form>
        </main>
        <figure class="main_img">
            <img src="../static/monomuselogo.png" alt="">
        </figure>
        <footer class="footer">
            <p id="copyYear"></p>
        </footer>
    </div>
    <script src="../static/script.js"></script>
</body>
</html>
