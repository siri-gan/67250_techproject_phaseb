<svg xmlns="http://www.w3.org/2000/svg" width="820" height="220" viewBox="0 0 820 220" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">MONOMUSE futuristic logo</title>
  <desc id="logoDesc">Futuristic wordmark with cyan and violet neon accents.</desc>
  <defs>
    <linearGradient id="wordmarkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3DE6FF"/>
      <stop offset="100%" stop-color="#A787FF"/>
    </linearGradient>
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EEBFF"/>
      <stop offset="50%" stop-color="#7FA8FF"/>
      <stop offset="100%" stop-color="#C08BFF"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="820" height="220" rx="18" fill="#04050F"/>
  <rect x="18" y="18" width="784" height="184" rx="14" fill="#0A0F24" stroke="#3DE6FF" stroke-opacity="0.35"/>

  <g filter="url(#neonGlow)">
    <path d="M70 62 H750" stroke="url(#barGradient)" stroke-width="4" stroke-linecap="round"/>
    <path d="M70 158 H750" stroke="url(#barGradient)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="70" cy="62" r="5" fill="#3DE6FF"/>
    <circle cx="750" cy="62" r="5" fill="#A787FF"/>
    <circle cx="70" cy="158" r="5" fill="#3DE6FF"/>
    <circle cx="750" cy="158" r="5" fill="#A787FF"/>
  </g>

  <text x="410" y="135"
        text-anchor="middle"
        font-family="'Space Grotesk', 'Orbitron', 'Arial Black', sans-serif"
        font-size="86"
        letter-spacing="8"
        font-weight="700"
        fill="url(#wordmarkGradient)"
        filter="url(#neonGlow)">MONOMUSE</text>
</svg>
