<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">MonoMuse night exterior concept</title>
  <desc id="desc">A stylized night view of a museum exterior with gold and white lighting.</desc>
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="building" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#sky)"/>
  <rect x="0" y="620" width="1280" height="180" fill="#1A1A1A"/>

  <rect x="210" y="210" width="860" height="390" rx="16" fill="url(#building)" stroke="#D4AF37" stroke-opacity="0.4" stroke-width="3"/>
  <rect x="255" y="255" width="770" height="40" fill="#D4AF37"/>

  <rect x="300" y="330" width="190" height="190" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFD86B" stroke-opacity="0.35"/>
  <rect x="545" y="330" width="190" height="190" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFD86B" stroke-opacity="0.35"/>
  <rect x="790" y="330" width="190" height="190" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFD86B" stroke-opacity="0.35"/>

  <text x="640" y="506"
        text-anchor="middle"
        font-family="'Space Grotesk', Arial, sans-serif"
        font-size="58"
        font-weight="700"
        letter-spacing="6"
        fill="#FFF3B0">MONOMUSE</text>

  <rect x="560" y="620" width="160" height="120" fill="#0A0A0A" stroke="#D4AF37"/>
  <line x1="640" y1="620" x2="640" y2="740" stroke="#FFD86B"/>
</svg>
