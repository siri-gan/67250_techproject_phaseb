<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Siri Ganapathineedi">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="Museum website redesign project">
    <title>MonoMuse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body onload="addYear()">
    <header>
        <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        <nav>
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="../tickets.html" class="cta">Buy Tickets</a>
            <a href="checkout.html">Checkout</a>
        </nav>
    </header>

    <div class="main">
        <form>
            <label for="name">Name: (required)</label><br> 
            <input id="name" name="name" type="text" required><br><br>

            <label for="email">Email: (required)</label><br>
            <input id="email" name="email" type="email" required><br><br>

            <label for="quantity">Ticket Quantity: (required)</label><br>
            <input id="quantity" name="quantity" type="number" min="1" required><br><br>

            <button type="submit">Submit</button>
        </form>
    </div>
    <footer>
        <p id="copyYear"></p>
    </footer>
    <script src="../static/script.js" defer></script>
</body>
</html>
