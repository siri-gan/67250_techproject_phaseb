<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Siri Ganapathineedi">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse ticket purchasing">
    <title>Buy Tickets MonoMuse</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
</head>

<body onload="addYear()">
    <div class="container">

        <header class="header">
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        </header>

        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="buytickets.html" class="cta">Buy Tickets</a>
            <a href="checkout.html">Checkout</a>
        </nav> 

        <main class="main">
            <h2>Ticket Prices</h2>
            <table>
                <tr><th>Type</th><th>Description</th><th>Price</th></tr>
                <tr><td>Adult</td><td>Ages 18+</td><td>$18</td></tr>
                <tr><td>Student</td><td>Student ID required</td><td>$10</td></tr>
                <tr><td>Member</td><td>Member ID required</td><td>$15</td></tr>
            </table>

            <h2>April 2026 Schedule</h2>
            <table>
                <tr><th>Date</th><th>Availability</th><th>Action</th></tr>
                <tr>
                    <td>April 10</td>
                    <td>Available</td>
                    <td><button class="buyBtn" onclick="showPurchaseForm('April 10')">Buy Now</button></td>
                </tr>
                <tr>
                    <td>April 12</td>
                    <td>Available</td>
                    <td><button class="buyBtn" onclick="showPurchaseForm('April 12')">Buy Now</button></td>
                </tr>
                <tr>
                    <td>April 15</td>
                    <td>Available</td>
                    <td><button class="buyBtn" onclick="showPurchaseForm('April 15')">Buy Now</button></td>
                </tr>
            </table>

            <!-- Hidden purchase form -->
            <form id="ticketForm">
                <h3>Complete Your Purchase</h3>

                <label for="custName">Name:</label><br>
                <input id="custName" type="text" required><br><br>

                <label for="custEmail">Email:</label><br>
                <input id="custEmail" type="email" required><br><br>

                <label for="ticketQty">Number of Tickets:</label><br>
                <input id="ticketQty" type="number" min="1" required><br><br>

                <label for="selectedDate">Selected Date:</label><br>
                <input id="selectedDate" type="text" readonly><br><br>

                <button type="button" onclick="submitPurchase()">Submit</button>
            </form>
        </main>

        <figure class="main_img">
            <img src="../static/MonoMuse%20Museum%20Image.png" width="320" alt="">
        </figure>

        <footer class="footer">
            <p id="copyYear"></p>
        </footer>

    </div>

    <script src="../static/script.js"></script>
</body>
</html>
